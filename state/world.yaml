  corporate_world:
    members: [greg]
    description: "Greg + Prestige & Partners — the grinding machine."
    standing: "the establishment"

power_system:
  name: "Capybara Calm"
  ranks:
    - Dormant
    - Awakening
    - Full Floof
    - Transcendent Relaxation
  rules:
    - description: "Chloe transforms to capybara when she achieves genuine peace; reverts to human when corporate anxiety resurfaces"
      severity: hard
    - description: "Chloe emits calming endorphins through her fur — anyone touching her feels immediate stress relief"
      severity: hard
    - description: "Chloe cannot speak in capybara form — only hums, squeaks, and contented sounds"
      severity: hard
    - description: "Chloe's capybara form is approximately 150 lbs and smells faintly of lavender and fresh hay"
      severity: soft
    - description: "The longer Chloe stays relaxed, the stronger her calming aura becomes"
      severity: soft
    - description: "If Chloe seriously attempts to re-enter corporate life, she will permanently revert to human form and lose all capybara abilities"
      severity: hard

