geography:
  greenpoint_apt:
    description: >
      The 3-bedroom walkup apartment in Greenpoint, Brooklyn. Chloe, Maya, and Elif's home.
      4th floor, no elevator. Tiny kitchen, living room with Chloe's nest of Muji beanbags.
      This is the 'anti-hustle sanctuary'.
    type: residence
    location: Greenpoint, Brooklyn

  prestige_pr:
    description: >
      Prestige & Partners PR firm in Midtown Manhattan. Open-plan office. Greg's domain.
      Beige and soulless.
    type: workplace
    location: Midtown, Manhattan

  bodega_corner:
    description: >
      The corner bodega 'Mohammed's' — open 24/7, Mohammed knows everyone.
      Source of cheap produce for capybara Chloe.
    type: commercial
    location: Greenpoint, Brooklyn

  prospect_park:
    description: >
      Prospect Park — where Chloe eventually gets outdoor time. Hidden grassy spot by the lake.
    type: park
    location: Brooklyn

  rooftop:
    description: >
      The building's rooftop — late-night hangout spot, city lights, deep conversations.
    type: social
    location: Greenpoint, Brooklyn

factions:
  the_roommates:
    members: [chloe, maya, elif]
    description: "Chloe/Maya/Elif — chosen family."
