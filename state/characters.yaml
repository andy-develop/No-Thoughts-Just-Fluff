characters:
  chloe:
    name: Chloe
    age: 25
    role: protagonist
    status: transformed
    location: "Greenpoint apartment, Brooklyn"
    first_appeared: 0
    last_appeared: 0
    total_appearances: 0
    description: >
      Former PR junior exec. Before transformation: burned-out, anxiety-ridden,
      surviving on iced coffee and panic, drowning in student debt ($102K).
      After transformation: a 150-pound, fur-covered, herb-scented, eternally
      relaxed capybara-hamster hybrid magical creature. Can't speak — only hums
      'mmm' contentedly. Emits calming endorphins that affect anyone who touches
      her fur. Loses human form permanently when anxious/aspiring; maintains
      capybara form when content/idle.
    key_traits:
      - "People-pleaser buried under sarcasm"
      - "Deeply loyal once trust is earned"
      - "Terrified of stillness"
      - "Secretly creative"
    belief_system:
      core_belief: "Rest is not failure"
      deepest_fear: "Becoming invisible — nobody notices I exist"
      deepest_desire: "To be truly seen and accepted as I am"
      moral_line: "Never abandon someone who showed me kindness"
      self_deception: "I need the hustle to prove my worth"
    voice_fingerprint:
      vocab_level: normal
      sentence_length: mixed
      signature_phrases:
        - "Like, literally"
        - "I can't even"
        - "Okay but"
      topics_gravitate:
        - work complaints
        - apartment drama
      topics_avoid:
        - real feelings
        - family
      speech_quirk: "Trail off mid-sentence when overwhelmed"

  maya:
    name: Maya
    age: 27
    role: supporting
    status: alive
    location: "Greenpoint apartment, Brooklyn"
